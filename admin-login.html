<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - Placement Portal">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Admin Login - Placement Portal</title>
    <style>
        /* ============================================
           CSS VARIABLES - Admin theme colors
           ============================================ */
        :root {
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --color-admin-primary: #1a1a2e;
            --color-admin-secondary: #16213e;
            --color-admin-accent: #e94560;
            --color-admin-accent-light: #ff6b6b;
            --color-text: #2d3748;
            --color-white: #ffffff;
        }

        /* ============================================
           GLOBAL RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            overflow: hidden;
            background: #0f0f0f;
        }

        /* ============================================
           ANIMATED BACKGROUND - Admin Theme
           ============================================ */
        .dynamic-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(135deg, var(--color-admin-primary) 0%, var(--color-admin-secondary) 100%);
        }

        .admin-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.2;
        }

        /* Computer Desktop Monitor */
        .computer {
            position: absolute;
            width: 120px;
            height: 90px;
            animation: float 8s ease-in-out infinite;
        }

        /* Monitor screen */
        .computer .screen {
            width: 120px;
            height: 75px;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border: 4px solid var(--color-admin-accent);
            border-radius: 8px;
            position: relative;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        /* Screen glow effect */
        .computer .screen::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            background: linear-gradient(180deg, rgba(233, 69, 96, 0.2) 0%, transparent 100%);
            border-radius: 4px;
        }

        /* Blinking power light */
        .computer .power-light {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            bottom: 4px;
            right: 10px;
            animation: blink 2s infinite;
            box-shadow: 0 0 10px #00ff00;
        }

        /* Monitor stand */
        .computer .stand {
            width: 40px;
            height: 8px;
            background: var(--color-admin-accent);
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .computer .stand::before {
            content: '';
            position: absolute;
            width: 15px;
            height: 10px;
            background: var(--color-admin-accent);
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px 2px 0 0;
        }

        /* Computer positions */
        .computer:nth-child(1) {
            top: 10%;
            left: 8%;
            animation-delay: 0s;
        }

        .computer:nth-child(2) {
            top: 60%;
            right: 12%;
            width: 100px;
            animation-delay: 2s;
        }

        .computer:nth-child(2) .screen {
            width: 100px;
            height: 65px;
        }

        .computer:nth-child(3) {
            bottom: 15%;
            left: 15%;
            width: 110px;
            animation-delay: 4s;
        }

        .computer:nth-child(3) .screen {
            width: 110px;
            height: 70px;
        }

        /* Lock icon elements */
        .lock {
            position: absolute;
            width: 40px;
            height: 50px;
            animation: float 6s ease-in-out infinite;
        }

        .lock::before {
            content: '🔒';
            font-size: 40px;
            position: absolute;
        }

        .lock:nth-child(4) {
            top: 25%;
            right: 8%;
            animation-delay: 1s;
        }

        .lock:nth-child(5) {
            bottom: 25%;
            right: 30%;
            animation-delay: 3s;
        }

        .lock:nth-child(6) {
            top: 50%;
            left: 5%;
            animation-delay: 5s;
        }

        /* Animations */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 10px #00ff00;
            }
            50% {
                opacity: 0.2;
                box-shadow: 0 0 3px #00ff00;
            }
        }

        /* ============================================
           MAIN CONTAINER
           ============================================ */
        .container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ============================================
           LOGIN CARD - Admin Styled
           ============================================ */
        .login-card {
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 45px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(233, 69, 96, 0.3);
            animation: cardPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 2px solid rgba(233, 69, 96, 0.3);
        }

        @keyframes cardPop {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(40px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ============================================
           HEADER SECTION
           ============================================ */
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--color-admin-accent) 0%, var(--color-admin-accent-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: #ffffff;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            animation: logoShine 3s infinite;
        }

        @keyframes logoShine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .login-header h1 {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .login-header p {
            font-size: 14px;
            color: #aaa;
            font-weight: 500;
        }

        /* Security badge */
        .security-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid rgba(233, 69, 96, 0.5);
            border-radius: 20px;
            font-size: 12px;
            color: var(--color-admin-accent-light);
            margin-top: 10px;
            font-weight: 600;
        }

        /* ============================================
           FORM ELEMENTS
           ============================================ */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
        }

        .required {
            color: var(--color-admin-accent);
            margin-left: 4px;
        }

        /* Input field with icon */
        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid #333;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #1a1a1a;
            color: #ffffff;
        }

        .form-control::placeholder {
            color: #666;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-admin-accent);
            background: #222;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }

        /* ============================================
           OPTIONS ROW
           ============================================ */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-admin-accent);
        }

        .forgot-password {
            color: var(--color-admin-accent);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--color-admin-accent-light);
            transform: translateX(3px);
        }

        /* ============================================
           SUBMIT BUTTON
           ============================================ */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--color-admin-accent) 0%, var(--color-admin-accent-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.6);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        /* ============================================
           SECURITY WARNING
           ============================================ */
        .security-warning {
            margin-top: 25px;
            padding: 15px;
            background: rgba(233, 69, 96, 0.1);
            border-left: 4px solid var(--color-admin-accent);
            border-radius: 8px;
        }

        .security-warning p {
            color: #ccc;
            font-size: 13px;
            line-height: 1.6;
            margin: 0;
        }

        .security-warning strong {
            color: var(--color-admin-accent-light);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .login-footer p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .login-footer a {
            color: var(--color-admin-accent);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-footer a:hover {
            color: var(--color-admin-accent-light);
            text-decoration: underline;
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .logo {
                width: 75px;
                height: 75px;
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="dynamic-background">
        <div class="admin-animation">
            <!-- Computer Desktop Monitors -->
            <div class="computer">
                <div class="screen">
                    <div class="power-light"></div>
                </div>
                <div class="stand"></div>
            </div>
            <div class="computer">
                <div class="screen">
                    <div class="power-light"></div>
                </div>
                <div class="stand"></div>
            </div>
            <div class="computer">
                <div class="screen">
                    <div class="power-light"></div>
                </div>
                <div class="stand"></div>
            </div>
            
            <!-- Lock Icons -->
            <div class="lock"></div>
            <div class="lock"></div>
            <div class="lock"></div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo">🛠️</div>
                <h1>ADMIN ACCESS</h1>
                <p>Secure System Control Panel</p>
                <div class="security-badge">🔒 RESTRICTED ACCESS</div>
            </div>

            <!-- Login Form -->
            <form id="adminLoginForm" method="POST" action="admin-dashboard.html">
                <!-- Username Field -->
                <div class="form-group">
                    <label for="username">
                        Admin Username<span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username" 
                            placeholder="Enter admin username"
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">
                        Password<span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔑</span>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            placeholder="Enter admin password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <!-- Remember Me and Forgot Password -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="handleForgotPassword(event)">Contact Super Admin</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-login">
                    🔓 Access System
                </button>
            </form>

            <!-- Security Warning -->
            <div class="security-warning">
                <p>
                    <strong>⚠️ Security Notice:</strong> This area is restricted to authorized administrators only. 
                    All login attempts are logged and monitored. Unauthorized access attempts will be reported.
                </p>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p>Not an admin? <a href="index.html">← Back to Login</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('⚠️ Please fill in all fields');
                return;
            }
            
            const usernameRegex = /^[a-zA-Z0-9_]{3,20}$/;
            if (!usernameRegex.test(username)) {
                alert('⚠️ Invalid username format');
                return;
            }
            
            if (password.length < 8) {
                alert('⚠️ Password must be at least 8 characters');
                return;
            }
            
            console.log('Admin login attempt:', {
                username: username,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent
            });
            
            // Simulate successful login and redirect to admin dashboard
            setTimeout(function() {
                window.location.href = 'admin-dashboard.html';
            }, 500);
        });
        
        function handleForgotPassword(event) {
            event.preventDefault();
            alert('🔐 Admin Password Recovery\n\n' +
                  'For security reasons, admin passwords cannot be reset online.\n\n' +
                  'Please contact the Super Administrator or System Administrator:\n' +
                  '• Email: admin@yourorganization.com\n' +
                  '• Phone: [Contact Number]\n\n' +
                  'Your request will be verified before password reset.');
        }
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('adminLoginForm');
                if (form && document.activeElement.tagName === 'INPUT') {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        window.addEventListener('load', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
