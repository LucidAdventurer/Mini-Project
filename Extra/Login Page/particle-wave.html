<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Placement & Training Assessment</title>
    <style>
        /* ============================================
           GLOBAL RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            /* Prevent scrollbars during animation */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* Fallback gradient background */
        }

        /* ============================================
           ANIMATED CANVAS BACKGROUND
           Creates dynamic particle wave effect
           ============================================ */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Behind login container */
        }

        /* ============================================
           MAIN CONTAINER
           Centers the login form on screen
           ============================================ */
        .container {
            position: relative;
            z-index: 2;
            /* Above canvas */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ============================================
           LOGIN CARD
           Main form container with glassmorphism effect
           ============================================ */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            /* Semi-transparent white for glass effect */
            backdrop-filter: blur(10px);
            /* Glassmorphism blur */
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            /* Soft shadow for depth */
            animation: slideIn 0.6s ease-out;
            /* Entrance animation */
        }

        /* Slide-in animation for login card */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================
           HEADER SECTION
           Logo and title area
           ============================================ */
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* Matches body gradient */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .login-header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }

        .login-header p {
            font-size: 14px;
            color: #666;
        }

        /* ============================================
           ROLE SELECTOR
           Tab-style buttons for Student/Teacher/Guest
           ============================================ */
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #f0f0f0;
            /* Light gray background */
            padding: 5px;
            border-radius: 10px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s ease;
            /* Smooth transitions */
            font-weight: 500;
        }

        /* Active state for selected role */
        .role-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }

        .role-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .role-btn.active:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* ============================================
           FORM ELEMENTS
           Input fields and labels
           ============================================ */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
        }

        /* Focus state with gradient border effect */
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* ============================================
           ADDITIONAL OPTIONS
           Remember me and forgot password
           ============================================ */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        /* Custom checkbox styling */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #764ba2;
        }

        /* ============================================
           SUBMIT BUTTON
           Primary action button
           ============================================ */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            /* Slight lift effect */
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* ============================================
           GUEST ACCESS SECTION
           Alternative login option
           ============================================ */
        .guest-access {
            margin-top: 20px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .guest-access p {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .btn-guest {
            display: inline-block;
            padding: 10px 30px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-guest:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        /* ============================================
           RESPONSIVE DESIGN
           Mobile-friendly adjustments
           ============================================ */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 20px;
            }

            .role-btn {
                font-size: 12px;
                padding: 8px;
            }
        }

        /* ============================================
           HIDDEN CONTENT
           For conditional display based on role
           ============================================ */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- ============================================
         ANIMATED BACKGROUND CANVAS
         Particle wave animation rendered here
         ============================================ -->
    <canvas id="particle-canvas"></canvas>

    <!-- ============================================
         MAIN CONTAINER
         Holds the login form
         ============================================ -->
    <div class="container">
        <div class="login-card">
            <!-- Header with logo and title -->
            <div class="login-header">
                <div class="logo">P</div>
                <h1>Welcome Back</h1>
                <p>Placement & Training Assessment Platform</p>
            </div>

            <!-- Role selection tabs -->
            <div class="role-selector">
                <button class="role-btn active" data-role="student">Student</button>
                <button class="role-btn" data-role="teacher">Teacher</button>
            </div>

            <!-- Login form -->
            <form id="loginForm" method="POST" action="dashboard.php">
                <!-- Hidden field to store selected role -->
                <!-- Will be submitted with form data -->
                <input type="hidden" name="role" id="roleInput" value="student">

                <!-- Email input field -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <!-- Password input field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <!-- Remember me and forgot password options -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.php" class="forgot-password">Forgot Password?</a>
                </div>

                <!-- Submit button -->
                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <!-- Guest access option -->
            <div class="guest-access">
                <p>Don't have an account?</p>
                <a href="guest-dashboard.php" class="btn-guest">Continue as Guest</a>
            </div>
        </div>
    </div>

    <script>
        /* ============================================
           PARTICLE WAVE ANIMATION
           Creates animated background effect
           ============================================ */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size to fill window
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Particle configuration
        const particles = [];
        const particleCount = 100; // Number of particles
        const connectionDistance = 150; // Max distance for connections

        // Particle class definition
        class Particle {
            constructor() {
                // Random starting position
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Random velocity for movement
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                // Random size
                this.radius = Math.random() * 2 + 1;
            }

            // Update particle position
            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off edges
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            // Draw particle on canvas
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialize particles
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // Draw connections between nearby particles
        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    // Draw line if particles are close enough
                    if (distance < connectionDistance) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${1 - distance / connectionDistance})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Animation loop
        function animate() {
            // Clear canvas with gradient background
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw all particles
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Draw connections
            connectParticles();

            // Continue animation
            requestAnimationFrame(animate);
        }

        // Start animation
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        /* ============================================
           ROLE SELECTION LOGIC
           Handles switching between Student/Teacher tabs
           ============================================ */
        const roleButtons = document.querySelectorAll('.role-btn');
        const roleInput = document.getElementById('roleInput');

        roleButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Remove active class from all buttons
                roleButtons.forEach(btn => btn.classList.remove('active'));
                
                // Add active class to clicked button
                this.classList.add('active');
                
                // Update hidden input value
                roleInput.value = this.dataset.role;
            });
        });

        /* ============================================
           FORM SUBMISSION HANDLER
           Validates and submits login form
           ============================================ */
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent default form submission for now
            
            // Get form values
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = roleInput.value;

            // Basic validation
            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }

            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address');
                return;
            }

            // In production, this would submit to PHP backend
            // For now, show what would be submitted
            console.log('Login attempt:', { email, role });
            
            // Uncomment below to actually submit the form:
            // this.submit();
            
            // For demo purposes, redirect based on role
            alert(`Login successful as ${role}!`);
            // window.location.href = role === 'student' ? 'student-dashboard.php' : 'teacher-dashboard.php';
        });
    </script>
</body>
</html>
